name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  lint-type-test:
    runs-on: ubuntu-latest
    env:
      # Force the deterministic hashing embedder so CI needs no model download / network.
      RTB__EMBEDDINGS__PROVIDER: hashing
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install CPU torch
        run: pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Install package (dev)
        run: pip install -e ".[dev]"

      - name: Ruff
        run: ruff check src tests scripts

      - name: Mypy
        run: mypy src

      - name: Pytest
        run: pytest -q

      - name: Smoke test end-to-end demo
        run: rtb demo
